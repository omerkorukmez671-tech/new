server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/smartparking
    username: sp_user
    password: sp_pass
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

parking:
  max-capacity: 100

